[main]
shell=/usr/bin/zsh
font=JetBrains Mono:size=12.1
pad=15x15

[colors-dark]
alpha=1.0
background=0d0f18
foreground=c0caf5

## Normal/regular colors (color0-color7)
regular0=15161e  # black
regular1=f7768e  # red
regular2=9ece6a  # green
regular3=e0af68  # yellow
regular4=7aa2f7  # blue
regular5=bb9af7  # magenta
regular6=7dcfff  # cyan
regular7=a9b1d6  # white

## Bright colors (color8-color15)
bright0=414868   # bright black
bright1=ff899d   # bright red
bright2=b1e37d   # bright green
bright3=f3c27b   # bright yellow
bright4=8cb5ff   # bright blue
bright5=ceadff   # bright magenta
bright6=90e2ff   # bright cyan
bright7=c0caf5   # bright white

[csd]
# Disable client-side decorations since Sway handles borders
preferred=none
