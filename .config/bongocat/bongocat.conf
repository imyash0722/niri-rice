# Position settings
cat_x_offset=0                   # Horizontal offset from center position
cat_y_offset=-4                  # Vertical offset from default position
cat_align=center                 # Horizontal alignment (left/center/right)

# Size settings
cat_height=49                    # Height of bongo cat

# Overlay settings
overlay_height=60                # Height of the entire overlay bar
overlay_opacity=0                # Background opacity (0-255)
overlay_position=top             # Position on screen
layer=overlay                    # Layer type (top/overlay)

# Animation settings
idle_frame=0                     
fps=60                           
keypress_duration=100            

# Input devices
keyboard_device=/dev/input/event3
keyboard_device=/dev/input/event8
