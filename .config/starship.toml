# Minimal Starship Config (p10k Pure style) using terminal colors
add_newline = true

format = """
$directory$git_branch$git_status$cmd_duration $character"""

[directory]
style = "bold white"
read_only = " 🔒"
truncation_length = 3
truncation_symbol = ""
format = "[$path]($style) "

[character]
success_symbol = "[❯](bold bright-black)"
error_symbol = "[❯](bold red)"
vicmd_symbol = "[❮](bold bright-black)"

[git_branch]
style = "bright-black"
symbol = ""
format = "[$symbol$branch]($style) "

[git_status]
style = "bright-black"
format = '([$all_status$ahead_behind]($style) )'
conflicted = "*"
ahead = "⇡"
behind = "⇣"
diverged = "⇡⇣"
untracked = "*"
stashed = "*"
modified = "*"
staged = "*"
renamed = "*"
deleted = "*"

[cmd_duration]
style = "yellow"
format = "[$duration]($style)"
min_time = 5000

[package]
disabled = true
